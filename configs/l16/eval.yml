model:
    cls: MMJiT_L_16_txt2

dataset:
    use_cc12m: False
    llm: google/flan-t5-large
    num_workers: 8
    image_size: 512
    prompt_length: 256

training:
    batch_size: 1024
    ema_type: 'const'
    ema_vals: [0.99995]

eval:
    on_training: False
    num_samples: 30000
    cfg_scale: 8.5
    device_batch_size: 8
    mscoco:
        enable: False
    geneval:
        enable: True
        cfg_scale: 8.5
        n_sample_per_prompt: 4
        jax:
            batch_size: 16
    dpgbench:
        enable: True
        cfg_scale: 8.5
        batch_size: 16
        pic_num: 4
        max_prompts: -1

sampling:
    n_T: 100
    prediction: x
    a_min: 0.01
    t_sample_schedule: lognorm
    t_lognorm_mu: -0.8
    t_lognorm_sigma: 0.8
    label_drop_rate: 0.1

eval_only: True
eval_show_sample: True
sharding: hsdp
